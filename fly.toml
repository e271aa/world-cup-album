# fly.toml — gerado para world-cup-album
# Substitui "world-cup-album" pelo nome que escolheres no fly launch

app = "world-cup-album"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/data"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = false
  min_machines_running = 1

[[mounts]]
  source = "album_data"
  destination = "/data"
