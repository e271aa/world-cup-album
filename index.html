<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum de Cromos — Copa do Mundo 2026</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- ECRÃ DE LOGIN -->
    <div id="authGate" class="auth-gate">
        <div class="auth-card">
            <div class="auth-logo">🏆</div>
            <h1>Álbum de Cromos</h1>
            <p class="auth-subtitle">Copa do Mundo FIFA 2026</p>
            <button id="loginBtn" class="auth-btn">Entrar com Google</button>
            <p id="authMsg" class="auth-msg"></p>
        </div>
    </div>

    <div class="app" style="display:none">
        <!-- HEADER -->
        <header class="header">
            <div class="header-top">
                <h1>
                    🏆 Álbum de Cromos
                    <span class="subtitle">Copa do Mundo FIFA 2026</span>
                </h1>
                <button id="headerLogoutBtn" class="btn-ghost" title="Terminar sessão">↪ Sair</button>
            </div>

            <div class="progress-section">
                <div class="progress-info">
                    <div>Progresso da Coleção</div>
                    <div><strong id="progressPercent">0%</strong></div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="conta1Count">0</div>
                        <div class="stat-label">Conta 1</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="conta2Count">0</div>
                        <div class="stat-label">Conta 2</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="missingCount">0</div>
                        <div class="stat-label">Faltam</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="duplicateCount">0</div>
                        <div class="stat-label">Duplicados</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="totalCount">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                </div>
            </div>
        </header>

        <!-- LEGEND -->
        <div class="legend">
            <div class="legend-item"><div class="legend-dot"></div>Faltam</div>
            <div class="legend-item"><div class="legend-dot owned"></div>Conta 1</div>
            <div class="legend-item"><div class="legend-dot conta2"></div>Conta 2</div>
            <div class="legend-item">🟠 Badge laranja = duplicados para trocar</div>
            <div class="legend-item">💡 Clica para ciclar · +/− para duplicados</div>
        </div>

        <!-- SEARCH -->
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="Pesquisar por jogador, equipa ou grupo..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            <button class="search-clear" id="searchClear" style="display:none" title="Limpar pesquisa">✕</button>
        </div>

        <!-- SEARCH RESULTS -->
        <div id="searchPanel" class="search-panel" style="display:none">
            <div id="searchResults"></div>
        </div>

        <!-- TABS -->
        <nav class="tabs" id="tabs"></nav>

        <!-- CONTENT -->
        <main id="content"></main>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
