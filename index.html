<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum de Cromos — Copa do Mundo 2026</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --accent: #f59e0b;
            --success: #10b981;
            --conta2: #7c3aed;
            --danger: #ef4444;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px 20px 60px;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-lg);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .header h1 .subtitle {
            display: block;
            font-size: 14px;
            font-weight: 400;
            opacity: 0.85;
            margin-top: 2px;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            font-family: inherit;
            font-weight: 600;
            padding: 9px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-ghost {
            background: rgba(255,255,255,0.15);
            color: white;
            backdrop-filter: blur(10px);
        }

        .btn-ghost:hover {
            background: rgba(255,255,255,0.25);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.9);
            color: white;
        }

        .btn-danger:hover {
            background: rgba(220, 38, 38, 1);
        }

        /* ===== PROGRESS ===== */
        .progress-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .progress-bar {
            background: rgba(255,255,255,0.2);
            border-radius: 999px;
            height: 12px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #fbbf24);
            border-radius: 999px;
            transition: width 0.4s ease;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .progress-info strong {
            font-size: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 8px;
        }

        .stat {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            line-height: 1;
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.85;
            margin-top: 4px;
        }

        /* ===== TABS ===== */
        .tabs {
            background: var(--surface);
            padding: 8px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            overflow-x: auto;
        }

        .tab {
            padding: 8px 14px;
            border-radius: 8px;
            background: transparent;
            color: var(--text-muted);
            border: none;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            position: relative;
        }

        .tab:hover {
            background: var(--bg);
            color: var(--text);
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .tab .tab-count {
            display: inline-block;
            margin-left: 6px;
            padding: 1px 7px;
            background: rgba(0,0,0,0.08);
            border-radius: 999px;
            font-size: 11px;
        }

        .tab.active .tab-count {
            background: rgba(255,255,255,0.25);
        }

        /* ===== CONTENT ===== */
        .panel {
            background: var(--surface);
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
            display: none;
        }

        .panel.active { display: block; }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }

        .panel-title {
            font-size: 20px;
            font-weight: 700;
        }

        .panel-progress {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* ===== TEAM ===== */
        .team {
            margin-bottom: 28px;
        }

        .team:last-child { margin-bottom: 0; }

        .team-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
            padding: 10px 14px;
            background: var(--bg);
            border-radius: 8px;
        }

        .team-name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 15px;
        }

        .team-flag {
            font-size: 22px;
            line-height: 1;
        }

        .team-code {
            display: inline-block;
            padding: 2px 8px;
            background: var(--primary);
            color: white;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .team-progress {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* ===== CROMO GRID ===== */
        .cromos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
        }

        .cromo {
            aspect-ratio: 5/6;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 6px;
            position: relative;
            user-select: none;
            overflow: hidden;
        }

        .cromo:hover {
            border-color: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .cromo-code {
            font-size: 9px;
            font-weight: 700;
            color: var(--text-muted);
            text-align: center;
            letter-spacing: 0.03em;
            margin-bottom: 1px;
        }

        .cromo-num {
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            color: var(--text);
            line-height: 1;
            margin-bottom: 3px;
        }

        .cromo-player {
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            line-height: 1.1;
            margin-bottom: auto;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            word-break: break-word;
        }

        .cromo.owned .cromo-player,
        .cromo.duplicate .cromo-player,
        .cromo.conta2 .cromo-player {
            color: rgba(255,255,255,0.8);
        }

        .cromo-status {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 18px;
            font-size: 11px;
            font-weight: 700;
        }

        /* Owned state */
        .cromo.owned {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            border-color: var(--success);
            color: white;
        }

        .cromo.owned .cromo-code,
        .cromo.owned .cromo-num {
            color: white;
        }

        .cromo.owned .cromo-code {
            opacity: 0.9;
        }

        /* Conta 2 state (purple) */
        .cromo.conta2 {
            background: linear-gradient(135deg, var(--conta2) 0%, #5b21b6 100%);
            border-color: var(--conta2);
            color: white;
        }

        .cromo.conta2 .cromo-code,
        .cromo.conta2 .cromo-num,
        .cromo.conta2 .cromo-player {
            color: rgba(255,255,255,0.9);
        }

        .cromo.conta2 .cromo-code {
            opacity: 0.9;
        }

        .cromo.conta2 .cromo-btn {
            background: rgba(255,255,255,0.3);
        }

        .cromo.conta2 .cromo-btn:hover {
            background: rgba(255,255,255,0.5);
        }

        .dup-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background: var(--accent);
            color: white;
            font-weight: 800;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 999px;
            min-width: 20px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        /* Cromo controls */
        .cromo-controls {
            position: absolute;
            top: 4px;
            left: 4px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .cromo:hover .cromo-controls {
            opacity: 1;
        }

        .cromo-btn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: none;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
        }

        .cromo-btn:hover {
            background: rgba(0,0,0,0.85);
        }

        .cromo.owned .cromo-btn,
        .cromo.conta2 .cromo-btn {
            background: rgba(255,255,255,0.3);
        }

        .cromo.owned .cromo-btn:hover,
        .cromo.conta2 .cromo-btn:hover {
            background: rgba(255,255,255,0.5);
        }

        /* ===== LEGEND ===== */
        .legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 14px;
            background: var(--surface);
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 12px;
            color: var(--text-muted);
            box-shadow: var(--shadow-sm);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            border: 2px solid var(--border);
        }

        .legend-dot.owned { background: var(--success); border-color: var(--success); }
        .legend-dot.conta2 { background: var(--conta2); border-color: var(--conta2); }

        /* ===== INSIGHTS ===== */
        .insights {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }

        .insight-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .insight-card.highlight {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
        }

        .insight-card.success {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            color: white;
            border: none;
        }

        .insight-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.85;
        }

        .insight-card.highlight .insight-title,
        .insight-card.success .insight-title {
            opacity: 0.95;
        }

        .insight-big {
            font-size: 28px;
            font-weight: 800;
            line-height: 1;
        }

        .insight-sub {
            font-size: 13px;
            opacity: 0.85;
        }

        .insight-empty {
            font-size: 13px;
            color: var(--text-muted);
            font-style: italic;
        }

        .insight-card.highlight .insight-empty,
        .insight-card.success .insight-empty {
            color: rgba(255,255,255,0.85);
        }

        .insight-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .insight-item {
            background: var(--surface);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
        }

        .insight-card.highlight .insight-item,
        .insight-card.success .insight-item {
            background: rgba(255,255,255,0.15);
            color: white;
            backdrop-filter: blur(10px);
        }

        .insight-item-head {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .insight-item-head .rank {
            font-weight: 800;
            color: var(--text-muted);
            min-width: 22px;
        }

        .insight-item-head strong {
            flex: 1;
            font-weight: 700;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            background: var(--border);
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
        }

        .insight-card.highlight .badge,
        .insight-card.success .badge {
            background: rgba(255,255,255,0.25);
            color: white;
        }

        .badge.ok {
            background: var(--success);
            color: white;
        }

        .badge.zero {
            background: var(--danger);
            color: white;
        }

        .insight-missing {
            margin-top: 6px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .insight-card.highlight .insight-missing,
        .insight-card.success .insight-missing {
            color: rgba(255,255,255,0.85);
        }

        .mini-bar {
            margin-top: 6px;
            background: var(--border);
            border-radius: 999px;
            height: 6px;
            overflow: hidden;
        }

        .mini-bar-fill {
            background: linear-gradient(90deg, var(--accent), #fbbf24);
            height: 100%;
            border-radius: 999px;
            transition: width 0.4s;
        }

        /* ===== EQUIPAS FILTERS ===== */
        .filter-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group + .filter-group {
            padding-left: 12px;
            border-left: 2px solid var(--border);
        }

        .filter-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .filter-pills {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-pill {
            padding: 6px 14px;
            border-radius: 999px;
            background: var(--bg);
            color: var(--text-muted);
            border: 2px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .filter-pill:hover {
            border-color: var(--primary-light);
            color: var(--text);
        }

        .filter-pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .filter-select {
            padding: 7px 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            background: var(--surface);
            cursor: pointer;
            outline: none;
            transition: border-color 0.15s;
        }

        .filter-select:focus {
            border-color: var(--primary-light);
        }

        .equipas-empty {
            text-align: center;
            padding: 48px 0;
            color: var(--text-muted);
            font-size: 15px;
        }

        /* ===== TRADES ===== */
        .trades-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .trades-section {
            background: var(--bg);
            border-radius: 12px;
            padding: 20px;
            border: 2px solid var(--border);
        }

        .trades-section-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
        }

        .trades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
        }

        .trade-item {
            aspect-ratio: 5/6;
            background: white;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 6px;
            position: relative;
            user-select: none;
            font-size: 10px;
            font-weight: 700;
            text-align: center;
            color: var(--text);
            overflow: hidden;
        }

        .trade-item-flag {
            font-size: 20px;
            line-height: 1;
        }

        .trade-item-team {
            font-size: 9px;
            line-height: 1.1;
            word-break: break-word;
            max-width: 100%;
        }

        .trade-item-code {
            font-size: 11px;
            font-weight: 800;
        }

        .trade-item-player {
            font-size: 8px;
            color: var(--text-muted);
            line-height: 1;
            max-height: 20px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .trade-item:hover {
            border-color: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .trade-item.selected-given {
            background: linear-gradient(135deg, var(--accent) 0%, #d97706 100%);
            border-color: var(--accent);
            color: white;
        }

        .trade-item.selected-received {
            background: linear-gradient(135deg, var(--conta2) 0%, #5b21b6 100%);
            border-color: var(--conta2);
            color: white;
        }

        .trade-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .trade-checkmark {
            position: absolute;
            top: 4px;
            right: 4px;
            background: white;
            color: var(--accent);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
        }

        .trade-item.selected-received .trade-checkmark {
            color: var(--conta2);
        }

        .trades-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            padding: 16px;
            background: white;
            border-radius: 10px;
        }

        .trades-actions button {
            flex: 1;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-light);
        }

        .btn-secondary {
            background: var(--border);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: var(--text-muted);
            color: white;
        }

        .trades-empty {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .trade-history {
            background: var(--bg);
            border-radius: 12px;
            padding: 20px;
        }

        .trade-history-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
        }

        .trade-record {
            background: white;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
        }

        .trade-record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .trade-record-items {
            display: flex;
            gap: 16px;
            font-size: 13px;
        }

        .trade-record-items div {
            flex: 1;
        }

        .trade-record-items strong {
            display: block;
            margin-bottom: 4px;
            color: var(--text);
        }

        @media (max-width: 768px) {
            .trades-container {
                grid-template-columns: 1fr;
            }
        }

        /* ===== SEARCH ===== */
        .search-bar {
            position: relative;
            margin-bottom: 16px;
        }

        .search-input {
            width: 100%;
            padding: 12px 48px 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
            outline: none;
            transition: border-color 0.15s;
            box-shadow: var(--shadow-sm);
        }

        .search-input:focus {
            border-color: var(--primary-light);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-clear {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--border);
            border: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 700;

            padding: 0;

            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;

        .search-clear:hover {

        .search-panel {

            padding: 24px;

        .search-header {

        .search-section {

        /* ===== TOAST ===== */
        .toast {

<body>

                ]
            },

                teams: [
                    { code: 'POR', name: 'Portugal', flag: '🇵🇹' },
                    { code: 'COD', name: 'Congo DR', flag: '🇨🇩' },

                ]
            },

                teams: [
                    { code: 'ENG', name: 'Inglaterra', flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
                    { code: 'CRO', name: 'Croácia', flag: '🇭🇷' },

                    { code: 'PAN', name: 'Panamá', flag: '🇵🇦' }
                ]
            }
        };

        let data = {};
        let players = {};
        let currentTab = 'Insights';
        let saveTimeout = null;

        // ============ INIT ============
        async function init() {
            await loadPlayers();
            await loadData();
            renderTabs();
            renderContent();
            updateStats();
        }

        async function loadPlayers() {
            try {
                const res = await fetch('players.json', { cache: 'no-store' });
                if (res.ok) {
                    players = await res.json();
                }
            } catch (e) {
                console.error('Erro ao ler players.json:', e);
            }
        }

        async function loadData() {
            try {
                const res = await fetch(`${FIREBASE_DB}/data.json`, { cache: 'no-store' });
                if (res.ok) {
                    const remote = await res.json();
                    if (remote && Array.isArray(remote.tenho)) {
                        data = remote;
                        ensureDataIntegrity();
                        return;
                    }
                }
            } catch (e) {
                console.error('Erro ao ler dados:', e);
            }
            createFreshData();
        }

        function createFreshData() {
            data = { tenho: [], conta2: [], duplicados: {} };
            saveData();
        }

        function ensureDataIntegrity() {
            if (!Array.isArray(data.tenho)) data.tenho = [];
            if (!Array.isArray(data.conta2)) data.conta2 = [];
            if (!data.duplicados || typeof data.duplicados !== 'object') data.duplicados = {};
            if (!data.trades || typeof data.trades !== 'object') {
                data.trades = { pending: { given: [], received: [] }, history: [] };
            }
            if (!data.trades.pending) data.trades.pending = { given: [], received: [] };
            if (!Array.isArray(data.trades.history)) data.trades.history = [];
        }

        // Helpers
        function cromoCode(type, teamCode, num) {
            return type === 'especiais' ? num : `${teamCode}${num}`;
        }

        function hasCromo(code) {   // conta 1
            return data.tenho.includes(code);
        }

        function hasConta2(code) {
            return data.conta2.includes(code);
        }

        function hasAny(code) {     // conta 1 ou conta 2
            return data.tenho.includes(code) || data.conta2.includes(code);
        }

        function getDups(code) {
            return data.duplicados[code] || 0;
        }

        function setConta2(code, val) {
            if (!Array.isArray(data.conta2)) data.conta2 = [];
            if (val) {
                // Conta 1 e Conta 2 são exclusivas
                const idx = data.tenho.indexOf(code);
                if (idx >= 0) { data.tenho.splice(idx, 1); delete data.duplicados[code]; }
                if (!data.conta2.includes(code)) data.conta2.push(code);
            } else {
                data.conta2 = data.conta2.filter(c => c !== code);
                delete data.duplicados[code];
            }
        }

        function setHas(code, val) {
            if (!Array.isArray(data.tenho)) data.tenho = [];
            const idx = data.tenho.indexOf(code);
            if (val && idx < 0) data.tenho.push(code);
            else if (!val && idx >= 0) {
                data.tenho.splice(idx, 1);
                delete data.duplicados[code];
            }
        }

        function setDups(code, n) {
            if (n > 0) data.duplicados[code] = n;
            else delete data.duplicados[code];
        }

        function saveData() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                try {
                    ensureDataIntegrity();
                    const body = JSON.stringify(data);
                    const res = await fetch(`${FIREBASE_DB}/data.json`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: body
                    });
                    if (!res.ok) {
                        const err = await res.text();
                        throw new Error(`Falha ao guardar (${res.status}): ${err}`);
                    }
                } catch (e) {
                    console.error('Erro ao guardar dados:', e);
                    console.error('Dados que falharam:', data);
                    showToast('⚠️ Erro ao guardar dados!');
                }
            }, 200);
        }

        // ============ RENDER TABS ============
        function renderTabs() {
            const container = document.getElementById('tabs');
            container.innerHTML = '';
            Object.entries(GROUPS).forEach(([name, group]) => {
                const btn = document.createElement('button');
                btn.className = 'tab' + (name === currentTab ? ' active' : '');
                btn.dataset.tab = name;

                if (name === 'Insights' || name === 'Equipas') {
                    btn.innerHTML = name;
                } else {
                    const stats = getGroupStats(name);
                    btn.innerHTML = `${name === 'Especiais' ? '⭐ Especiais' : name}<span class="tab-count">${stats.owned}/${stats.total}</span>`;
                }

                btn.onclick = () => switchTab(name);
                container.appendChild(btn);
            });
        }

        function switchTab(name) {
            currentTab = name;
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.dataset.tab === name);
            });
            document.querySelectorAll('.panel').forEach(p => {
                p.classList.toggle('active', p.dataset.panel === name);
            });
        }

        // ============ RENDER CONTENT ============
        function renderContent() {
            const container = document.getElementById('content');
            container.innerHTML = '';

            Object.entries(GROUPS).forEach(([name, group]) => {
                const panel = document.createElement('div');
                panel.className = 'panel' + (name === currentTab ? ' active' : '');
                panel.dataset.panel = name;

                if (name === 'Insights') {
                    panel.innerHTML = `
                        <div class="panel-header">
                            <div class="panel-title">Insights da tua coleção</div>
                        </div>
                    `;
                    panel.appendChild(renderInsightsPanel());
                } else if (name === 'Equipas') {
                    panel.innerHTML = `
                        <div class="panel-header">
                            <div class="panel-title">Equipas</div>
                        </div>
                    `;
                    panel.appendChild(renderEquipasPanel());
                } else if (name === 'Trocas') {
                    panel.innerHTML = `
                        <div class="panel-header">
                            <div class="panel-title">🔄 Trocas</div>
                        </div>
                    `;
                    panel.appendChild(renderTrocasPanel());
                } else {
                    const stats = getGroupStats(name);
                    panel.innerHTML = `
                        <div class="panel-header">
                            <div class="panel-title">${name === 'Especiais' ? '⭐ Cromos Especiais' : name}</div>
                            <div class="panel-progress">${stats.owned} / ${stats.total} cromos</div>
                        </div>
                    `;

                    if (name === 'Especiais') {
                        const grid = document.createElement('div');
                        grid.className = 'cromos-grid';
                        SPECIAL_CROMOS.forEach(code => {
                            grid.appendChild(createCromo('especiais', null, code));
                        });
                        panel.appendChild(grid);
                    } else {
                        group.teams.forEach(team => {
                            panel.appendChild(createTeamSection(team));
                        });
                    }
                }

                container.appendChild(panel);
            });

        function calculateInsights() {
            const teamStats = [];
            Object.entries(GROUPS).forEach(([name, group]) => {
                if (name === 'Insights' || name === 'Especiais' || name === 'Equipas' || name === 'Trocas') return;
                group.teams.forEach(team => {
                    const ownedNums = CROMO_NUMBERS.filter(n => hasAny(`${team.code}${n}`));
                    teamStats.push({ team, groupName: name, owned: ownedNums.length, ownedNums });
                });
            });

            let total = 0, owned = 0;
            SPECIAL_CROMOS.forEach(c => { total++; if (hasAny(c)) owned++; });
            Object.values(GROUPS).forEach(group => {
                group.teams.forEach(team => {
                    CROMO_NUMBERS.forEach(n => {
                        total++;
                        if (hasAny(`${team.code}${n}`)) owned++;
                    });
                });
            });

            const milestones = [25, 50, 75, 90, 100];
            const currentPct = total > 0 ? (owned / total) * 100 : 0;
            const nextMs = milestones.find(m => m > currentPct);
            const proximoMarco = nextMs ? {
                milestone: nextMs,
                needed: Math.ceil((nextMs / 100) * total) - owned
            } : null;

            const dupTotal = Object.values(data.duplicados).reduce((s, n) => s + n, 0);
            const dupList = Object.entries(data.duplicados).filter(([_, n]) => n > 0);

            const gruposCompletos = [];
            const gruposProgresso = [];
            Object.entries(GROUPS).forEach(([name]) => {
                if (name === 'Insights' || name === 'Especiais' || name === 'Equipas' || name === 'Trocas') return;
                const s = getGroupStats(name);
                gruposProgresso.push({ name, owned: s.owned, total: s.total, pct: Math.round((s.owned / s.total) * 100) });
                if (s.owned === s.total) gruposCompletos.push(name);
            });

            return {
                quaseLa: teamStats.filter(t => t.owned >= 10 && t.owned < 12).sort((a, b) => b.owned - a.owned),
                topTeams: teamStats.filter(t => t.owned < 12).sort((a, b) => b.owned - a.owned).slice(0, 3),
                completas: teamStats.filter(t => t.owned === 12),
                naoComecaste: teamStats.filter(t => t.owned === 0),
                gruposCompletos,
                gruposProgresso: gruposProgresso.sort((a, b) => b.pct - a.pct),
                proximoMarco,
                dupTotal,
                dupList
            };
        }

        function getPlayerName(teamCode, num) {
            return players.equipas && players.equipas[teamCode] ? (players.equipas[teamCode][num] || `#${num}`) : `#${num}`;
        }

        function getMissingForTeam(teamCode) {
            return CROMO_NUMBERS
                .filter(n => !hasAny(`${teamCode}${n}`))
                .map(n => `${teamCode}${n} ${getPlayerName(teamCode, n)}`);
        }

        function renderInsightsPanel() {
            const i = calculateInsights();
            const wrap = document.createElement('div');
            wrap.className = 'insights';

            // Próximo marco
            if (i.proximoMarco) {
                const card = document.createElement('div');
                card.className = 'insight-card highlight';
                card.innerHTML = `
                    <div class="insight-title">Próximo marco</div>
                    <div class="insight-big">${i.proximoMarco.needed} cromos</div>
                    <div class="insight-sub">para chegares aos ${i.proximoMarco.milestone}% da coleção</div>
                `;
                wrap.appendChild(card);
            }

            // Quase a completar
            const quase = document.createElement('div');
            quase.className = 'insight-card';
            let quaseHtml = `<div class="insight-title">Quase a completar</div>`;
            if (i.quaseLa.length === 0) {
                quaseHtml += `<div class="insight-empty">Ainda não tens equipas com 10+ cromos</div>`;
            } else {
                quaseHtml += `<div class="insight-list">` + i.quaseLa.map(t => `
                    <div class="insight-item">
                        <div class="insight-item-head">
                            <span class="team-flag">${t.team.flag}</span>
                            <strong>${t.team.name}</strong>
                            <span class="badge">${t.owned}/12</span>
                        </div>
                        <div class="insight-missing">Falta${12 - t.owned > 1 ? 'm' : ''}: ${getMissingForTeam(t.team.code).join(', ')}</div>
                    </div>
                `).join('') + `</div>`;
            }
            quase.innerHTML = quaseHtml;
            wrap.appendChild(quase);

            // Top equipas
            const top = document.createElement('div');
            top.className = 'insight-card';
            let topHtml = `<div class="insight-title">As tuas top equipas</div>`;
            if (i.topTeams.length === 0) {
                topHtml += `<div class="insight-empty">Sem dados</div>`;
            } else {
                topHtml += `<div class="insight-list">` + i.topTeams.map((t, idx) => `
                    <div class="insight-item">
                        <div class="insight-item-head">
                            <span class="rank">${idx + 1}.</span>
                            <span class="team-flag">${t.team.flag}</span>
                            <strong>${t.team.name}</strong>
                            <span class="badge">${t.owned}/12</span>
                        </div>
                    </div>
                `).join('') + `</div>`;
            }
            top.innerHTML = topHtml;
            wrap.appendChild(top);

            // Equipas completas
            if (i.completas.length > 0) {

        function createTeamSection(team) {
            const div = document.createElement('div');
            div.className = 'team';

            const owned = CROMO_NUMBERS.filter(n => hasAny(`${team.code}${n}`)).length;

            div.innerHTML = `

                        <span class="team-code">${team.code}</span>
                        <span>${team.name}</span>

                    <div class="team-progress">${owned}/12</div>
                </div>
            `;

            const grid = document.createElement('div');
            grid.className = 'cromos-grid';
            CROMO_NUMBERS.forEach(num => {
                grid.appendChild(createCromo('equipas', team.code, num));
            });
            div.appendChild(grid);
            return div;
        }

        function createCromo(type, teamCode, num) {
            const code = cromoCode(type, teamCode, num);
            const displayCode = teamCode ? `${teamCode}${num}` : 'FIFA';
            const c1 = hasCromo(code);
            const c2 = hasConta2(code);
            const dups = getDups(code);

            let playerName = '';
            if (type === 'especiais') {
                playerName = players.especiais ? (players.especiais[num] || '') : '';
            } else {
                playerName = players.equipas && players.equipas[teamCode] ? (players.equipas[teamCode][num] || '') : '';
            }

            const el = document.createElement('div');
            el.className = 'cromo';
            if (c2)      el.classList.add('conta2');
            else if (c1) el.classList.add('owned');

            const statusText = c2 ? '✓ Conta 2' : c1 ? '✓ Conta 1' : '';

            el.innerHTML = `
                <div class="cromo-code">${displayCode}</div>
                <div class="cromo-num">${num}</div>
                ${playerName ? `<div class="cromo-player">${playerName}</div>` : ''}
                <div class="cromo-status">${statusText}</div>
                ${dups > 0 ? `<div class="dup-badge">+${dups}</div>` : ''}
                <div class="cromo-controls">
                    <button class="cromo-btn" data-action="add" title="Avançar">+</button>
                    <button class="cromo-btn" data-action="remove" title="Recuar">−</button>
                </div>
            `;

            el.addEventListener('click', (e) => {
                const btn = e.target.closest('.cromo-btn');
                const _c1 = hasCromo(code);
                const _c2 = hasConta2(code);
                const d = getDups(code);
                if (btn) {
                    e.stopPropagation();
                    if (btn.dataset.action === 'add') {
                        if (!_c1 && !_c2)     setHas(code, true);       // Adiciona à C1
                        else                  setDups(code, d + 1);      // +1 duplicado (C1 ou C2)
                    } else {
                        if (d > 0)            setDups(code, d - 1);      // Remove duplicado
                        else if (_c2)         setConta2(code, false);    // Remove da C2
                        else if (_c1)         setHas(code, false);       // Remove da C1
                    }
                } else {
                    // Ciclo principal: nenhum → C1 → C2 → nenhum
                    if (!_c1 && !_c2)         setHas(code, true);
                    else if (_c1)             { setHas(code, false); setConta2(code, true); }
                    else if (_c2)             setConta2(code, false);
                }
                saveData();
                if (searchQuery) {
                    renderSearchResults();
                } else {
                    renderContent();
                    renderTabs();
                }
                updateStats();
            });

            return el;
        }

        // ============ STATS ============
        function getGroupStats(groupName) {
            const group = GROUPS[groupName];
            if (groupName === 'Insights' || groupName === 'Equipas' || groupName === 'Trocas') {
                return { owned: 0, total: 0 };
            }
            if (groupName === 'Especiais') {
                const total = SPECIAL_CROMOS.length;
                const owned = SPECIAL_CROMOS.filter(c => hasAny(c)).length;
                return { owned, total };
            }
            let owned = 0, total = 0;
            group.teams.forEach(team => {
                CROMO_NUMBERS.forEach(n => {
                    total++;
                    if (hasAny(`${team.code}${n}`)) owned++;
                });
            });
            return { owned, total };
        }

        function updateStats() {
            let total = 0, c1 = 0, c2 = 0, dups = 0;

            SPECIAL_CROMOS.forEach(code => {
                total++;
                if (hasCromo(code)) c1++;
                if (hasConta2(code)) c2++;
                dups += getDups(code);
            });

            Object.values(GROUPS).forEach(group => {
                group.teams.forEach(team => {
                    CROMO_NUMBERS.forEach(n => {
                        total++;
                        const code = `${team.code}${n}`;
                        if (hasCromo(code)) c1++;
                        if (hasConta2(code)) c2++;
                        dups += getDups(code);
                    });
                });
            });

            const owned = new Set([...data.tenho, ...data.conta2]).size;
            const percent = total > 0 ? Math.round((owned / total) * 100) : 0;
            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('conta1Count').textContent = c1;
            document.getElementById('conta2Count').textContent = c2;
            document.getElementById('missingCount').textContent = total - owned;
            document.getElementById('duplicateCount').textContent = dups;
            document.getElementById('totalCount').textContent = total;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');

            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2200);
        }

        // ============ EQUIPAS ============
        let equipasFilter = { status: 'todos', grupo: 'todos', sort: 'az' };

        function setEquipasFilter(key, value) {
            equipasFilter[key] = value;
            requestAnimationFrame(() => {
