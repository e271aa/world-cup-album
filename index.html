<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum de Cromos — Copa do Mundo 2026</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app" id="app">
        <div class="header">
            <div class="header-top">
                <div>
                    <h1>Álbum de Cromos <span class="subtitle">Copa do Mundo 2026</span></h1>
                </div>
                <div class="actions">
                    <button class="btn-primary" id="btn-limpar">🗑️ Limpar Tudo</button>
                    <button class="btn-ghost" id="btn-exportar-json">📥 Exportar</button>
                </div>
            </div>
            <div class="tabs">
                <button class="tab-btn active" data-tab="cromos">Cromos</button>
                <button class="tab-btn" data-tab="insights">Insights</button>
                <button class="tab-btn" data-tab="trocas">Trocas</button>
                <button class="tab-btn" data-tab="equipas">Equipas</button>
            </div>
        </div>

        <!-- Tabs Content -->
        <div class="tabs-content">
            <!-- Cromos Tab -->
            <div id="tab-cromos" class="tab-pane active">
                <div class="search-section">
                    <input type="text" id="search-input" placeholder="🔍 Pesquisa por jogador, equipa ou grupo...">
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">Tudo</button>
                        <button class="filter-btn" data-filter="tenho">Tenho</button>
                        <button class="filter-btn" data-filter="duplicado">Duplicado</button>
                        <button class="filter-btn" data-filter="falta">Em Falta</button>
                    </div>
                </div>
                <div id="cromos-container" class="cromos-grid"></div>
                <div id="search-container" class="search-results"></div>
            </div>

            <!-- Insights Tab -->
            <div id="tab-insights" class="tab-pane">
                <div id="insights-container"></div>
            </div>

            <!-- Trocas Tab -->
            <div id="tab-trocas" class="tab-pane">
                <div id="trocas-container"></div>
            </div>

            <!-- Equipas Tab -->
            <div id="tab-equipas" class="tab-pane">
                <div id="equipas-container"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
